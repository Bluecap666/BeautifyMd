# 配置文件示例
beautify:
  # 是否添加 emoji
  add_emoji: true
  
  # 是否添加分割线
  add_dividers: true
  
  # 是否美化代码块
  beautify_code_blocks: true
  
  # 是否优化标题层次
  optimize_headers: true
  
  # 是否添加引用样式
  add_quote_styles: true
  
  # 是否美化列表
  beautify_lists: true
  
  # 是否添加表格样式
  beautify_tables: true
  
  # 是否添加强调效果
  add_emphasis: true

# 文件处理设置
file_processing:
  # 文件大小阈值 (字节)，超过此大小将分割文件
  split_threshold: 50000  # 50KB
  
  # 分割块大小 (字符数)
  chunk_size: 5000
  
  # 分割块重叠 (字符数)，保持上下文连贯性
  chunk_overlap: 200

# 输出设置
output:
  # 输出目录 (相对于工作目录，为空则使用原目录)
  output_dir: "beautified"
  
  # 是否在文件名后添加后缀
  add_suffix: true
  suffix: "_beautified"
  
  # 保留原始文件备份
  keep_backup: false

# 日志设置
logging:
  # 日志级别 (DEBUG, INFO, WARNING, ERROR)
  level: "INFO"
  
  # 是否保存日志文件
  save_to_file: true
  log_file: "beautify.log"
